<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doller to Rupees</title>
</head>
<body>

<h1>Doller to Rupees</h1>

<input type="number" id="dollar" placeholder="Enter Dollar">
<button onclick="convert()">Convert</button>

<h3 id="result"></h3>

<script>
function convert() {
    let dollar = Number(document.getElementById("dollar").value);

    let rate = 86; // 1 Dollar = ₹86

    let rupees = dollar * rate;

    document.getElementById("result").innerHTML = "₹ " + rupees;
}
</script>

</body>
</html>
